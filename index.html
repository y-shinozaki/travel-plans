<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇹🇭 2026年タイ旅行 ウィークリースケジュール</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #333; }
.header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 16px 24px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 18px; font-weight: 600; }
.header .sub { font-size: 12px; color: #888; margin-left: auto; }
.legend { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 24px; background: #fff; border-bottom: 1px solid #e8e8e8; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; }
.cal-outer { overflow-x: auto; padding: 0 16px 24px; }
.cal { display: grid; grid-template-columns: 52px repeat(5, 1fr); min-width: 700px; margin-top: 16px; border: 1px solid #ddd; border-radius: 10px; overflow: hidden; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.cell { border-right: 1px solid #e8e8e8; border-bottom: 1px solid #e8e8e8; }
.cell:last-child { border-right: none; }
/* Header row */
.day-header { padding: 10px 6px; text-align: center; background: #fafafa; border-bottom: 2px solid #ddd; }
.day-header .dow { font-size: 11px; color: #888; font-weight: 500; }
.day-header .date { font-size: 16px; font-weight: 600; color: #333; }
.day-header .label { font-size: 10px; color: #aaa; margin-top: 2px; }
.time-header { background: #fafafa; border-bottom: 2px solid #ddd; }
/* Time column */
.time-cell { height: 60px; display: flex; align-items: flex-start; justify-content: flex-end; padding: 4px 6px 0 0; font-size: 10px; color: #bbb; border-bottom: 1px solid #e8e8e8; background: #fafafa; }
/* Day cells */
.day-cell { height: 60px; position: relative; border-bottom: 1px solid #f0f0f0; padding: 2px; }
.day-cell.half { border-bottom: 1px dashed #f5f5f5; }
/* Events */
.event { position: absolute; left: 3px; right: 3px; border-radius: 5px; padding: 3px 5px; font-size: 10px; overflow: hidden; border-left: 3px solid; z-index: 2; }
.event .ev-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.event .ev-time { font-size: 9px; opacity: 0.7; margin-top: 1px; }
/* Categories */
.cat-move  { background: #deeeff; border-color: #3a8fdd; color: #0d4f8c; }
.cat-sight { background: #e2f4d6; border-color: #4a9c2a; color: #2d6010; }
.cat-food  { background: #fde8f0; border-color: #e0508a; color: #7a1a42; }
.cat-hotel { background: #fef3dc; border-color: #d4900a; color: #6b4200; }
.cat-shop  { background: #eeebff; border-color: #6c5ce7; color: #3a2ea0; }
</style>
</head>
<body>

<div class="header">
  <span style="font-size:24px">🇹🇭</span>
  <h1>2026年タイ旅行 ウィークリースケジュール</h1>
  <span class="sub">タイ時間（UTC+7）基準</span>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#3a8fdd"></div>✈️ 移動</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4a9c2a"></div>🛕 観光</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e0508a"></div>🍴 食事</div>
  <div class="legend-item"><div class="legend-dot" style="background:#d4900a"></div>🛏️ 宿泊</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6c5ce7"></div>🛍️ 買物</div>
</div>

<div class="cal-outer">
<div class="cal" id="cal"></div>
</div>

<script>
const HOUR_H = 60;
const START = 6;
const END = 25; // 翌1:00まで

const days = [
  { dow:'水', date:'8/12', label:'バンコク着' },
  { dow:'木', date:'8/13', label:'バンコク観光' },
  { dow:'金', date:'8/14', label:'パタヤ移動' },
  { dow:'土', date:'8/15', label:'バンコク戻り' },
  { dow:'日', date:'8/16', label:'帰国日' },
];

// start/end は タイ時間（小数）
const events = [
  // 8/12
  { d:0, cat:'cat-move',  title:'✈️ TG683 HND→BKK（依田家）',  start:10.58, end:15.08, note:'10:35→15:05' },
  { d:0, cat:'cat-move',  title:'✈️ TG645 NGO→BKK（篠崎家）', start:11.0,  end:15.0,  note:'11:00→15:00' },
  { d:0, cat:'cat-hotel', title:'🛏️ チェックイン 137ピラーズ（篠崎家）', start:15.5, end:17.0, note:'' },
  { d:0, cat:'cat-hotel', title:'🏡 チェックイン 米増家（依田家）',      start:16.0, end:17.5, note:'' },
  { d:0, cat:'cat-food',  title:'🍴 ディナー',                start:18.0, end:20.0,  note:'タイ料理？' },
  { d:0, cat:'cat-food',  title:'🍴 朝cafe Tiengna Viennoiserie', start:24.0, end:25.0, note:'翌6:00〜' },
  // 8/13
  { d:1, cat:'cat-move',  title:'🚗 →ワットパークナム',  start:7.0,  end:8.0,  note:'' },
  { d:1, cat:'cat-sight', title:'🛕 ワットパークナム',   start:8.0,  end:9.0,  note:'' },
  { d:1, cat:'cat-food',  title:'🍴 ランチ スパンニガ',  start:11.0, end:13.0, note:'Supanniga' },
  { d:1, cat:'cat-move',  title:'🚗 →エムクオーティエ', start:13.0, end:14.0, note:'' },
  { d:1, cat:'cat-shop',  title:'🛍️ エムクオーティエ',  start:14.0, end:15.5, note:'お土産' },
  { d:1, cat:'cat-food',  title:'🍴 ディナー',          start:18.0, end:20.0, note:'韓国料理？' },
  { d:1, cat:'cat-food',  title:'🍴 朝cafe Horme Cafe', start:24.75,end:25.0, note:'翌6:45〜' },
  // 8/14
  { d:2, cat:'cat-food',  title:'🍴 朝cafe Horme Cafe Bangna', start:6.75, end:8.0,  note:'〜8:00' },
  { d:2, cat:'cat-sight', title:'🛕 ワットサマーン（ガネーシャ）',       start:8.0,  end:9.0,  note:'' },
  { d:2, cat:'cat-move',  title:'🚗 →パタヤ（2.5〜3H）',              start:9.0,  end:12.0, note:'' },
  { d:2, cat:'cat-hotel', title:'🛏️ パタヤ ホテルチェックイン',         start:14.0, end:15.0, note:'' },
  { d:2, cat:'cat-sight', title:'🏖️ パタヤ観光',                       start:15.0, end:22.0, note:'ビーチなど' },
  // 8/15
  { d:3, cat:'cat-sight', title:'🏖️ パタヤ観光（続き）', start:6.0,  end:12.0, note:'〜チェックアウト' },
  { d:3, cat:'cat-move',  title:'🚗 →バンコク（3H）',   start:12.0, end:15.0, note:'' },
  { d:3, cat:'cat-hotel', title:'🛏️ チェックイン 137ピラーズ バンコク', start:15.0, end:16.5, note:'' },
  { d:3, cat:'cat-food',  title:'🍴 朝cafe BARTELS',    start:24.0, end:25.0, note:'翌6:00〜 Sathon' },
  // 8/16
  { d:4, cat:'cat-food',  title:'🍴 朝cafe BARTELS',    start:6.0,  end:7.0,  note:'〜7:00' },
  { d:4, cat:'cat-food',  title:'🍴 ランチ候補 Tuang / ルエントン', start:10.0, end:11.5, note:'' },
  { d:4, cat:'cat-food',  title:'🍴 ディナー（空港？）', start:16.0, end:18.0, note:'' },
  { d:4, cat:'cat-move',  title:'✈️ TG640 BKK→NRT（依田家）', start:22.17, end:25.0, note:'22:10→翌6:20' },
  { d:4, cat:'cat-move',  title:'✈️ TG644 BKK→NGO（篠崎家）', start:24.08, end:25.0, note:'翌0:05→翌8:00' },
];

const cal = document.getElementById('cal');

// ヘッダー行
const timeHdr = document.createElement('div');
timeHdr.className = 'cell time-header';
cal.appendChild(timeHdr);
days.forEach(d => {
  const el = document.createElement('div');
  el.className = 'cell day-header';
  el.innerHTML = `<div class="dow">${d.dow}曜日</div><div class="date">${d.date}</div><div class="label">${d.label}</div>`;
  cal.appendChild(el);
});

// 時間スロット（1時間単位）
for (let h = START; h < END; h++) {
  const displayH = h % 24;
  const label = h >= 24 ? `翌${displayH}:00` : `${displayH}:00`;

  const timeCell = document.createElement('div');
  timeCell.className = 'cell time-cell';
  timeCell.style.height = HOUR_H + 'px';
  timeCell.textContent = label;
  cal.appendChild(timeCell);

  days.forEach((d, di) => {
    const cell = document.createElement('div');
    cell.className = 'cell day-cell';
    cell.style.height = HOUR_H + 'px';

    // このセルに重なるイベントを配置
    const cellStart = h;
    const cellEnd = h + 1;
    const cellEvents = events.filter(e => e.d === di && e.start < cellEnd && e.end > cellStart);

    cellEvents.forEach((ev, ei) => {
      const evEl = document.createElement('div');
      evEl.className = `event ${ev.cat}`;

      const topOffset = Math.max(0, (ev.start - cellStart)) * HOUR_H;
      const height = (Math.min(ev.end, cellEnd) - Math.max(ev.start, cellStart)) * HOUR_H - 2;

      evEl.style.top = topOffset + 'px';
      evEl.style.height = Math.max(height, 18) + 'px';
      if (cellEvents.length > 1) {
        evEl.style.left = (3 + ei * 48) + '%';
        evEl.style.right = ((cellEvents.length - 1 - ei) * 48) + '%';
      }

      evEl.innerHTML = `<div class="ev-title">${ev.title}</div>${height > 25 ? `<div class="ev-time">${ev.note || ''}</div>` : ''}`;
      evEl.title = `${ev.title}\n${ev.note}`;
      cell.appendChild(evEl);
    });

    cal.appendChild(cell);
  });
}
</script>
</body>
</html>
